<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeHelper AI</title>
    <link rel="stylesheet" href="style.css">  <!-- Links to CSS -->
</head>
<body>
    <h1>Welcome to CodeHelper AI!</h1>
    <p>Ask me anything about coding: Python, Java, C++, HTML, CSS, JavaScript.</p>

        <div id="chat-messages"></div>  <!-- Where messages show -->
        <input type="text" id="user-input" placeholder="Type your question here...">
        <button id="send-button">Send</button>
    </div>
    <script src="script.js"></script>  <!-- Links to JavaScript -->
</body>
</html>
